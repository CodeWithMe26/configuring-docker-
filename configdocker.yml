  - hosts: all
    tasks: 

     - name: Create Docker Repo
       yum_repository: 
        name: docker_repo
        description: Docker Repo
        baseurl: https://download.docker.com/linux/centos/7/x86_64/stable/
        gpgcheck: no

     - name: install docker
       package: 
        name: "docker-ce-18.09.1-3.el7.x86_64"  
        state: present

     - name: start the docker
       service: 
        name: "docker"
        state: started
        enabled: yes

     - name: install docker sdk
       command: pip3 install docker

     - name: pull docker image
       docker_image: 
        name: httpd
        source: pull
     - name: creating directory
       file: 
        path: "/root/ansiblecode/web/"
        state: directory

     - name: copying the code
       copy: 
        src: "/etc/Ansible/home.html"
        dest: "/root/ansiblecode/web/"

     - name: launching docker container
       docker_container: 
        name: httpd-webserver
        image: httpd
        state: started
        tty: true
        exposed_ports: 
         - "80"
        volumes: 
         - /root/ansiblecode/web/:/usr/local/apache2/htdocs/
